project_name: nail-retouch-sdxl-v1
base_model: stabilityai/stable-diffusion-xl-base-1.0
project_root: /content/nail-retouch-assistant
processed_dir: dataset/processed
train_metadata: train/metadata.jsonl
val_metadata: val/metadata.jsonl
colab_workdir: /content/workdir
kohya_repo: /content/kohya_ss
prepared_data_dir: /content/workdir/train_data
output_dir: /content/workdir/outputs
logging_dir: /content/workdir/logs
output_name: nail_retouch_sdxl_v1
sample_prompts:
  - professional manicure photo retouch, clean cuticles, clean sidewalls, refined nail shape, glossy nail surface, natural skin texture, realistic hand photo, square, french, nude
  - professional manicure photo retouch, clean cuticles, clean sidewalls, refined nail shape, glossy nail surface, natural skin texture, realistic hand photo, almond, glitter, nude
  - professional manicure photo retouch, clean cuticles, clean sidewalls, refined nail shape, glossy nail surface, natural skin texture, realistic hand photo, coffin, 3d art, mixed
training:
  resolution: 768,768
  network_dim: 16
  network_alpha: 16
  train_batch_size: 2
  gradient_accumulation_steps: 4
  max_train_epochs: 24
  learning_rate: 1e-4
  unet_lr: 1e-4
  text_encoder_lr: 5e-5
  optimizer_type: AdamW8bit
  lr_scheduler: cosine
  save_every_n_epochs: 4
  mixed_precision: fp16
  max_data_loader_n_workers: 2
  bucket_reso_steps: 64
  min_bucket_reso: 512
  max_bucket_reso: 1024
